# Sub2API Docker 部署：backend + user-portal 两镜像
#
# 网络说明：服务端口仅绑定 127.0.0.1（见下方 ports），需自备反向代理对外暴露。
#          反代须加入本 compose 网络，才能通过服务名（backend:8080、user-portal:80）通信。
#          路由约定：/api /v1 /v1beta /backend-api /antigravity /setup /responses /images /health
#          及内嵌 admin 前端 → backend:8080；用户门户 → user-portal:80。
#
# 数据库/缓存：PostgreSQL 与 Redis 为外部独立服务（不在本 compose 中），
#              通过 .env 文件配置其主机地址。

services:
  backend:
    image: ghcr.io/${OWNER}/sub2api:${BACKEND_TAG:-latest}   # 版本参数化
    container_name: sub2api-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # 单一 bind mount：config.yaml、logs、pricing、.installed 等全部落在 ./data 下
      # （容器内 /app/data 是配置查找与数据落地的默认目录），把 config.yaml 放在 ./data/config.yaml
      - ./data:/app/data
    ports:
      # 仅绑 127.0.0.1（需自备反向代理对外暴露），宿主端口参数化（右侧容器端口固定 8080）
      - "127.0.0.1:${BACKEND_PORT:-9200}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-m", "5", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  user-portal:
    image: ghcr.io/${OWNER}/sub2api-user-portal:${USER_PORTAL_TAG:-latest}   # 版本参数化
    container_name: sub2api-user-portal
    restart: unless-stopped
    ports:
      # 仅绑 127.0.0.1（需自备反向代理对外暴露），宿主端口参数化（右侧容器端口固定 80）
      - "127.0.0.1:${USER_PORTAL_PORT:-9201}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
