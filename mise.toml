# 工具链与命令单一来源（统一通过 mise 管理）
[tools]
go = "1.26.4"               # 与 backend/go.mod 对齐
node = "20.18.1"            # 固定具体版本
pnpm = "9.15.9"
golangci-lint = "2.9.0"

# ---------- 依赖安装 ----------
[tasks.install]
description = "安装全部组件依赖（backend + frontend + user-portal）"
depends = ["install-backend", "install-frontend", "install-user-portal"]

[tasks.install-backend]
description = "下载后端 Go 依赖"
dir = "backend"
run = "go mod download"

[tasks.install-frontend]
description = "安装 frontend 依赖"
dir = "frontend"
run = "pnpm install --frozen-lockfile"

[tasks.install-user-portal]
description = "安装 user-portal 依赖"
dir = "user-portal"
run = "pnpm install --frozen-lockfile"

# ---------- 构建 ----------
[tasks.build]
description = "编译后端单二进制（内嵌 frontend）"
depends = ["install-frontend"]
run = [
  "pnpm --dir frontend run build",
  "cd backend && CGO_ENABLED=0 go build -tags embed -trimpath -o bin/server ./cmd/server",
]

# ---------- 本地运行 ----------
[tasks.run]
description = "本地运行已构建的后端单二进制（内嵌前端；需先 mise run build + backend/config.yaml + 外部 DB/Redis）"
dir = "backend"
run = '''
if [ ! -x bin/server ]; then
  echo "未找到 backend/bin/server，请先执行：mise run build"
  exit 1
fi
if [ ! -f config.yaml ]; then
  echo "缺少 backend/config.yaml，请先从模板拷贝并按需修改（外部 DB/Redis 连接等）："
  echo "  cp deploy/config.example.yaml backend/config.yaml   # 在仓库根执行"
  exit 1
fi
exec ./bin/server
'''

# ---------- 代码生成 ----------
[tasks.generate]
description = "重新生成 Ent ORM 与 Wire 注入代码（改 schema/wire 后必跑，生成物要提交）"
dir = "backend"
run = [
  "go generate ./ent",
  "go generate ./cmd/server",
]

# ---------- 质量：lint ----------
[tasks.lint-backend]
description = "后端 golangci-lint"
dir = "backend"
run = "golangci-lint run ./..."

[tasks.lint-frontend]
description = "frontend ESLint 检查"
depends = ["install-frontend"]
dir = "frontend"
run = "pnpm run lint:check"

[tasks.lint-user-portal]
description = "user-portal ESLint 检查"
depends = ["install-user-portal"]
dir = "user-portal"
run = "pnpm run lint:check"

# ---------- 质量：test ----------
[tasks.test-backend]
description = "后端单测 + 集成测试"
dir = "backend"
run = [
  "go test -tags=unit ./...",
  "go test -tags=integration ./...",
]

[tasks.test-frontend]
description = "frontend 类型检查 + 关键路径 vitest"
depends = ["install-frontend"]
dir = "frontend"
run = [
  "pnpm run typecheck",
  "pnpm exec vitest run src/views/auth/__tests__/LinuxDoCallbackView.spec.ts src/views/auth/__tests__/WechatCallbackView.spec.ts src/views/user/__tests__/PaymentView.spec.ts src/views/user/__tests__/PaymentResultView.spec.ts src/components/user/profile/__tests__/ProfileInfoCard.spec.ts src/views/admin/__tests__/SettingsView.spec.ts",
]

[tasks.test-user-portal]
description = "user-portal 类型检查"
depends = ["install-user-portal"]
dir = "user-portal"
run = "pnpm run typecheck"

[tasks.test-e2e-local]
description = "本地端到端测试（go test -tags=e2e ./internal/integration/...）"
dir = "backend"
run = "go test -tags=e2e -v -timeout=300s ./internal/integration/..."

# ---------- 镜像 ----------
[tasks.backend-image]
description = "构建 backend 镜像（backend/Dockerfile，context 取仓库根）"
run = "docker build -f backend/Dockerfile -t sub2api-backend:local ."

[tasks.user-portal-image]
description = "构建 user-portal 镜像（user-portal/Dockerfile，context 取仓库根）"
run = "docker build -f user-portal/Dockerfile -t sub2api-user-portal:local ."

# ---------- 发版（打 tag，收口改版本→提交→tag→推送） ----------
[tasks.backend-release]
description = "发布 backend：改版本号→提交→打 tag→推送（参数：<版本> [--notes 说明]）"
usage = '''
arg "<version>" help="语义化版本号，如 0.2.0（不带 v 前缀）"
flag "--notes <notes>" help="本次更新重点，写入 annotated tag 注释并作为 GitHub Release 正文置顶" default=""
'''
run = '''
set -euo pipefail
VERSION="${usage_version}"
NOTES="${usage_notes:-}"

if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
  echo "错误：版本号 '${VERSION}' 不是合法 SemVer（应形如 0.2.0 或 0.2.0-rc.1）" >&2
  exit 1
fi
if [ -n "$(git status --porcelain)" ]; then
  echo "错误：工作区不干净，请先提交或清理后再发版" >&2
  exit 1
fi

TAG="backend-v${VERSION}"
printf '%s\n' "${VERSION}" > backend/cmd/server/VERSION
git add backend/cmd/server/VERSION
git commit -m "chore(release): 发布 backend v${VERSION}"
if [ -n "${NOTES}" ]; then
  git tag -a "${TAG}" -m "${NOTES}"
else
  git tag "${TAG}"
fi
git push origin HEAD
git push origin "${TAG}"
echo "已发布 ${TAG}：commit 与 tag 均已推送，CI 将自动构建并创建 GitHub Release"
'''

[tasks.user-portal-release]
description = "发布 user-portal：改版本号→提交→打 tag→推送（参数：<版本> [--notes 说明]）"
usage = '''
arg "<version>" help="语义化版本号，如 0.2.0（不带 v 前缀）"
flag "--notes <notes>" help="本次更新重点，写入 annotated tag 注释并作为 GitHub Release 正文置顶" default=""
'''
run = '''
set -euo pipefail
VERSION="${usage_version}"
NOTES="${usage_notes:-}"

if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
  echo "错误：版本号 '${VERSION}' 不是合法 SemVer（应形如 0.2.0 或 0.2.0-rc.1）" >&2
  exit 1
fi
if [ -n "$(git status --porcelain)" ]; then
  echo "错误：工作区不干净，请先提交或清理后再发版" >&2
  exit 1
fi

TAG="user-portal-v${VERSION}"
(cd user-portal && pnpm version "${VERSION}" --no-git-tag-version --allow-same-version >/dev/null)
git add user-portal/package.json user-portal/pnpm-lock.yaml
git commit -m "chore(release): 发布 user-portal v${VERSION}"
if [ -n "${NOTES}" ]; then
  git tag -a "${TAG}" -m "${NOTES}"
else
  git tag "${TAG}"
fi
git push origin HEAD
git push origin "${TAG}"
echo "已发布 ${TAG}：commit 与 tag 均已推送，CI 将自动构建并创建 GitHub Release"
'''
