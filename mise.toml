# 工具链与命令单一来源（统一通过 mise 管理）
[tools]
go = "1.26.4"               # 与 backend/go.mod 对齐
node = "20.18.1"            # 固定具体版本
pnpm = "9.15.9"
golangci-lint = "2.9.0"

# ---------- 依赖安装 ----------
[tasks.install]
description = "安装全部组件依赖（backend + frontend + user-portal）"
depends = ["install-backend", "install-frontend", "install-user-portal"]

[tasks.install-backend]
description = "下载后端 Go 依赖"
dir = "backend"
run = "go mod download"

[tasks.install-frontend]
description = "安装 frontend 依赖（默认可更新 lockfile；传 --frozen 按 lockfile 精确安装，供 CI/Docker 复现）"
usage = '''
flag "--frozen" help="按 lockfile 精确安装、不更新 lockfile（CI/Docker 用；与 package.json 不一致则报错）"
'''
dir = "frontend"
# 默认本地：素的 pnpm install（可更新 lockfile）；--frozen 时追加 --frozen-lockfile
run = "pnpm install ${usage_frozen:+--frozen-lockfile}"

[tasks.install-user-portal]
description = "安装 user-portal 依赖（默认可更新 lockfile；传 --frozen 按 lockfile 精确安装，供 CI/Docker 复现）"
usage = '''
flag "--frozen" help="按 lockfile 精确安装、不更新 lockfile（CI/Docker 用；与 package.json 不一致则报错）"
'''
dir = "user-portal"
# 默认本地：素的 pnpm install（可更新 lockfile）；--frozen 时追加 --frozen-lockfile
run = "pnpm install ${usage_frozen:+--frozen-lockfile}"

# ---------- 构建 ----------
[tasks.build-backend]
description = "编译后端单二进制（内嵌 frontend）"
run = [
  "pnpm --dir frontend exec vue-tsc -b",
  "pnpm --dir frontend exec vite build",
  "cd backend && CGO_ENABLED=0 go build -tags embed -ldflags='-s -w' -trimpath -o bin/server ./cmd/server",
]

[tasks.build-user-portal]
description = "user-portal 类型检查 + 构建到 dist/（--env 默认 local：裸 vite build 读 .env.local；prod：vite build --mode prod 读 .env.prod）"
usage = '''
flag "-e --env <env>" help="构建环境：local（默认，读 .env.local）/ prod（读 .env.prod）" default="local"
'''
dir = "user-portal"
run = '''
#!/usr/bin/env bash
set -euo pipefail
pnpm exec vue-tsc -b
# vite 禁止 mode 名为 "local"（与 .env.local 后缀冲突），故 local 走裸 build（默认 production mode，仍加载 .env.local）
case "${usage_env}" in
  local) pnpm exec vite build ;;
  prod)  pnpm exec vite build --mode prod ;;
  *) echo "未知 --env ${usage_env}（仅支持 local / prod）" >&2; exit 1 ;;
esac
'''

# ---------- 本地运行 ----------
[tasks.run-backend]
description = "本地运行已构建的后端单二进制（内嵌前端；需先 mise run build-backend + backend/config.yaml + 外部 DB/Redis）"
dir = "backend"
run = '''
if [ ! -x bin/server ]; then
  echo "未找到 backend/bin/server，请先执行：mise run build-backend"
  exit 1
fi
exec ./bin/server
'''

[tasks.run-frontend]
description = "启动 frontend（admin 前端）开发服务器（/api 代理到后端）"
dir = "frontend"
run = "pnpm exec vite"

[tasks.run-user-portal]
description = "启动 user-portal 开发服务器（端口 5174，/api 代理到后端）"
dir = "user-portal"
run = "pnpm exec vite"

[tasks.preview-frontend]
description = "本地预览 frontend 构建产物（vite preview，需先有 dist/）"
dir = "frontend"
run = "pnpm exec vite preview"

[tasks.preview-user-portal]
description = "本地预览 user-portal 构建产物（vite preview，需先有 dist/）"
dir = "user-portal"
run = "pnpm exec vite preview"

# ---------- 代码生成 ----------
[tasks.generate-backend]
description = "重新生成 Ent ORM 与 Wire 注入代码（改 schema/wire 后必跑，生成物要提交）"
dir = "backend"
run = [
  "go generate ./ent",
  "go generate ./cmd/server",
]

# ---------- 质量：lint ----------
[tasks.lint-backend]
description = "后端 golangci-lint"
dir = "backend"
run = "golangci-lint run ./..."

[tasks.lint-frontend]
description = "frontend ESLint 检查"
dir = "frontend"
run = "pnpm exec eslint . --ext .vue,.js,.jsx,.cjs,.mjs,.ts,.tsx,.cts,.mts"

[tasks.lint-user-portal]
description = "user-portal ESLint 检查"
dir = "user-portal"
run = "pnpm exec eslint . --ext .vue,.ts,.tsx"

# ---------- 质量：test ----------
[tasks.test-backend]
description = "后端单测 + 集成测试"
dir = "backend"
run = [
  "go test -tags=unit ./...",
  "go test -tags=integration ./...",
]

[tasks.test-frontend]
description = "frontend 类型检查 + 关键路径 vitest"
dir = "frontend"
run = [
  "pnpm exec vue-tsc --noEmit",
  "pnpm exec vitest run src/views/auth/__tests__/LinuxDoCallbackView.spec.ts src/views/auth/__tests__/WechatCallbackView.spec.ts src/views/user/__tests__/PaymentView.spec.ts src/views/user/__tests__/PaymentResultView.spec.ts src/components/user/profile/__tests__/ProfileInfoCard.spec.ts src/views/admin/__tests__/SettingsView.spec.ts",
]

[tasks.test-user-portal]
description = "user-portal 类型检查 + 单元测试（vitest）"
dir = "user-portal"
run = "pnpm exec vue-tsc --noEmit && pnpm exec vitest run"

[tasks.coverage-frontend]
description = "frontend 覆盖率测试（vitest run --coverage）"
dir = "frontend"
run = "pnpm exec vitest run --coverage"

[tasks.test-e2e-local]
description = "本地端到端测试（go test -tags=e2e ./internal/integration/...）"
dir = "backend"
run = "go test -tags=e2e -v -timeout=300s ./internal/integration/..."

# ---------- 安全扫描 ----------
[tasks.audit-backend]
description = "后端依赖漏洞扫描（govulncheck）"
dir = "backend"
run = "go run golang.org/x/vuln/cmd/govulncheck@latest ./..."

[tasks.audit-frontend]
description = "frontend 依赖漏洞审计（pnpm audit + 按 .github/audit-exceptions.yml 过滤例外）"
# 例外过滤脚本为纯标准库 Python，直接用系统 python3（不纳入 mise 工具链，避免拖累其它 task 与镜像构建）
# audit 结果写临时文件，避免污染工作区（不写入任何被跟踪/常驻文件）
run = '''
#!/usr/bin/env bash
set -euo pipefail
audit_json="$(mktemp)"
trap 'rm -f "${audit_json}"' EXIT
pnpm --dir frontend audit --prod --audit-level=high --json > "${audit_json}" || true
python3 tools/check_pnpm_audit_exceptions.py \
  --audit "${audit_json}" \
  --exceptions .github/audit-exceptions.yml
'''

# ---------- 镜像 ----------
[tasks.image-backend]
description = "构建 backend 镜像（backend/Dockerfile，context 取仓库根）"
run = "docker build -f backend/Dockerfile -t mintpop-api-backend:local ."

[tasks.image-user-portal]
description = "构建 user-portal 镜像（user-portal/Dockerfile，context 取仓库根）"
run = "docker build -f user-portal/Dockerfile -t mintpop-api-user-portal:local ."

# ---------- 发版（打 tag，收口改版本→提交→tag→推送） ----------
# 两个发版任务统一签名（按参数形状消歧，两个位置参数均可选）：
#   mise run release-<c>                  → 最新稳定 tag 的 patch+1，无说明
#   mise run release-<c> "更新说明"        → patch+1，且带说明
#   mise run release-<c> v0.4.0           → 指定版本号，无说明
#   mise run release-<c> v0.4.0 "更新说明" → 指定版本号 + 说明
# 单参数：长得像 v?X.Y.Z(-pre) 当版本号，否则当说明；两参数则第一个必是版本号、第二个是说明。
# 自动递增只动 patch；升 minor/major 或发预发布须显式传版本号。发版从默认分支 mintpop 切。

[tasks.release-backend]
description = "发布 backend：改版本号→提交→打 tag→推送（用法见上方注释）"
usage = '''
arg "[arg1]" help="版本号(v?X.Y.Z) 或 更新说明（按形状判定）"
arg "[arg2]" help="更新说明（仅当 arg1 为版本号时）"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

RELEASE_BRANCH="mintpop"
COMPONENT="backend"
TAG_PREFIX="backend-v"
VERSION_FILE="backend/cmd/server/VERSION"
VERSION_RE='^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'

A1="${usage_arg1:-}"
A2="${usage_arg2:-}"

# —— 参数消歧 ——
VERSION=""
NOTES=""
if [ -n "${A2}" ]; then
  VERSION="${A1}"; NOTES="${A2}"
  if ! printf '%s' "${VERSION}" | grep -Eq "${VERSION_RE}"; then
    echo "错误：传两个参数时第一个必须是版本号（形如 v0.4.0），实际为 '${VERSION}'" >&2
    exit 1
  fi
elif [ -n "${A1}" ]; then
  if printf '%s' "${A1}" | grep -Eq "${VERSION_RE}"; then VERSION="${A1}"; else NOTES="${A1}"; fi
fi

# —— 一次 fetch，供「自动算版本号」与「落后检查」复用 ——
git fetch origin "${RELEASE_BRANCH}" --tags --quiet

# —— 版本号：未指定则取最新稳定 tag 的 patch+1 ——
if [ -z "${VERSION}" ]; then
  LATEST="$(git tag -l "${TAG_PREFIX}*" --sort=-v:refname | grep -E "^${TAG_PREFIX}[0-9]+\.[0-9]+\.[0-9]+$" | head -n1 || true)"
  BASE="${LATEST#"${TAG_PREFIX}"}"; BASE="${BASE:-0.0.0}"
  MAJOR="${BASE%%.*}"; REST="${BASE#*.}"; MINOR="${REST%%.*}"; PATCH="${REST##*.}"
  VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
  echo "未指定版本号，基于最新稳定 tag ${LATEST:-（无）} 自动递增 → ${VERSION}"
else
  VERSION="${VERSION#v}"
fi
TAG="${TAG_PREFIX}${VERSION}"

# —— 发版前校验，任一不过即中止、绝不打 tag ——
CURRENT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
if [ "${CURRENT_BRANCH}" != "${RELEASE_BRANCH}" ]; then
  echo "错误：发版必须在 ${RELEASE_BRANCH} 分支，当前在 ${CURRENT_BRANCH}" >&2; exit 1
fi
if [ -n "$(git status --porcelain)" ]; then
  echo "错误：工作区不干净，请先提交或清理后再发版" >&2; exit 1
fi
if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
  echo "错误：tag ${TAG} 已存在" >&2; exit 1
fi
LOCAL="$(git rev-parse "${RELEASE_BRANCH}")"
REMOTE="$(git rev-parse "origin/${RELEASE_BRANCH}")"
BASE_COMMIT="$(git merge-base "${RELEASE_BRANCH}" "origin/${RELEASE_BRANCH}")"
if [ "${LOCAL}" != "${REMOTE}" ] && [ "${LOCAL}" = "${BASE_COMMIT}" ]; then
  echo "错误：本地 ${RELEASE_BRANCH} 落后于 origin/${RELEASE_BRANCH}，请先 git pull" >&2; exit 1
fi

# —— 改版本号 → 提交 → 打 tag → 先推分支再推 tag ——
printf '%s\n' "${VERSION}" > "${VERSION_FILE}"
git add "${VERSION_FILE}"
# 版本文件已是目标值时暂存区无改动，跳过提交（避免空提交报错中断）
git diff --cached --quiet || git commit -m "chore(release): 发布 ${COMPONENT} v${VERSION}"
if [ -n "${NOTES}" ]; then
  git tag -a "${TAG}" -m "${NOTES}"
else
  git tag "${TAG}"
fi
git push origin "${RELEASE_BRANCH}"
git push origin "${TAG}"
echo "已发布 ${TAG}：commit 与 tag 均已推送，CI 将自动构建并创建 GitHub Release"
'''

[tasks.release-user-portal]
description = "发布 user-portal：改版本号→提交→打 tag→推送（用法见上方注释）"
usage = '''
arg "[arg1]" help="版本号(v?X.Y.Z) 或 更新说明（按形状判定）"
arg "[arg2]" help="更新说明（仅当 arg1 为版本号时）"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

RELEASE_BRANCH="mintpop"
COMPONENT="user-portal"
TAG_PREFIX="user-portal-v"
VERSION_RE='^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'

A1="${usage_arg1:-}"
A2="${usage_arg2:-}"

# —— 参数消歧 ——
VERSION=""
NOTES=""
if [ -n "${A2}" ]; then
  VERSION="${A1}"; NOTES="${A2}"
  if ! printf '%s' "${VERSION}" | grep -Eq "${VERSION_RE}"; then
    echo "错误：传两个参数时第一个必须是版本号（形如 v0.4.0），实际为 '${VERSION}'" >&2
    exit 1
  fi
elif [ -n "${A1}" ]; then
  if printf '%s' "${A1}" | grep -Eq "${VERSION_RE}"; then VERSION="${A1}"; else NOTES="${A1}"; fi
fi

# —— 一次 fetch，供「自动算版本号」与「落后检查」复用 ——
git fetch origin "${RELEASE_BRANCH}" --tags --quiet

# —— 版本号：未指定则取最新稳定 tag 的 patch+1 ——
if [ -z "${VERSION}" ]; then
  LATEST="$(git tag -l "${TAG_PREFIX}*" --sort=-v:refname | grep -E "^${TAG_PREFIX}[0-9]+\.[0-9]+\.[0-9]+$" | head -n1 || true)"
  BASE="${LATEST#"${TAG_PREFIX}"}"; BASE="${BASE:-0.0.0}"
  MAJOR="${BASE%%.*}"; REST="${BASE#*.}"; MINOR="${REST%%.*}"; PATCH="${REST##*.}"
  VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
  echo "未指定版本号，基于最新稳定 tag ${LATEST:-（无）} 自动递增 → ${VERSION}"
else
  VERSION="${VERSION#v}"
fi
TAG="${TAG_PREFIX}${VERSION}"

# —— 发版前校验，任一不过即中止、绝不打 tag ——
CURRENT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
if [ "${CURRENT_BRANCH}" != "${RELEASE_BRANCH}" ]; then
  echo "错误：发版必须在 ${RELEASE_BRANCH} 分支，当前在 ${CURRENT_BRANCH}" >&2; exit 1
fi
if [ -n "$(git status --porcelain)" ]; then
  echo "错误：工作区不干净，请先提交或清理后再发版" >&2; exit 1
fi
if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
  echo "错误：tag ${TAG} 已存在" >&2; exit 1
fi
LOCAL="$(git rev-parse "${RELEASE_BRANCH}")"
REMOTE="$(git rev-parse "origin/${RELEASE_BRANCH}")"
BASE_COMMIT="$(git merge-base "${RELEASE_BRANCH}" "origin/${RELEASE_BRANCH}")"
if [ "${LOCAL}" != "${REMOTE}" ] && [ "${LOCAL}" = "${BASE_COMMIT}" ]; then
  echo "错误：本地 ${RELEASE_BRANCH} 落后于 origin/${RELEASE_BRANCH}，请先 git pull" >&2; exit 1
fi

# —— 改版本号 → 提交 → 打 tag → 先推分支再推 tag ——
(cd user-portal && pnpm version "${VERSION}" --no-git-tag-version --allow-same-version >/dev/null)
git add user-portal/package.json
# 版本文件已是目标值时暂存区无改动，跳过提交（避免空提交报错中断）
git diff --cached --quiet || git commit -m "chore(release): 发布 ${COMPONENT} v${VERSION}"
if [ -n "${NOTES}" ]; then
  git tag -a "${TAG}" -m "${NOTES}"
else
  git tag "${TAG}"
fi
git push origin "${RELEASE_BRANCH}"
git push origin "${TAG}"
echo "已发布 ${TAG}：commit 与 tag 均已推送，CI 将自动构建并创建 GitHub Release"
'''

# ---------- Docker Compose 部署 ----------
[tasks.up]
description = "拉起 compose 部署（docker compose up -d，仅拉 registry 已发布镜像）"
run = "docker compose up -d"

[tasks.down]
description = "停止并移除 compose 部署（docker compose down）"
run = "docker compose down"
