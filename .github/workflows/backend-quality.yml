name: Backend Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
      - name: Lint backend
        run: mise run lint-backend
      - name: Test backend
        run: mise run test-backend
