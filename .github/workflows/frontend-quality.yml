name: Frontend Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v4
      - name: Lint frontend
        run: mise run lint-frontend
      - name: Test frontend
        run: mise run test-frontend
