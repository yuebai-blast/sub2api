name: User Portal Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  user-portal-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up mise
        uses: jdx/mise-action@v2
      - name: Lint user-portal
        run: mise run lint-user-portal
      - name: Test user-portal
        run: mise run test-user-portal
