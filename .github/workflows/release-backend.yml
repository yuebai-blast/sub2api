name: Release Backend

on:
  push:
    tags:
      - 'backend-v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/mintpop-api-backend

jobs:
  version-gate:
    name: Version Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Verify tag version matches VERSION file
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${REF_TYPE}" != "tag" ]; then
            echo "非 tag 触发（${REF_NAME}），跳过版本一致性校验"
            exit 0
          fi
          TAG_VERSION="${REF_NAME#backend-v}"
          FILE_VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION)"
          echo "tag 版本：${TAG_VERSION}"
          echo "文件版本：${FILE_VERSION}"
          if [ "${TAG_VERSION}" != "${FILE_VERSION}" ]; then
            echo "::error::tag 版本(${TAG_VERSION}) 与 backend/cmd/server/VERSION(${FILE_VERSION}) 不一致；请用 'mise run release-backend ${TAG_VERSION}' 改对版本号后重新发版"
            exit 1
          fi
          echo "版本一致，门禁通过"

  backend-quality:
    name: Quality Backend
    uses: ./.github/workflows/quality-backend.yml
  frontend-quality:
    name: Quality Frontend
    uses: ./.github/workflows/quality-frontend.yml

  build-push:
    name: Build and Push
    needs: [version-gate, backend-quality, frontend-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }},match=backend-v(.+)
            type=sha,enable=${{ github.ref_type != 'tag' }}
          flavor: |
            latest=auto
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: GitHub Release
    needs: [build-push]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          toTag: ${{ github.ref_name }}
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "tag_resolver": {
                "method": "semver",
                "filter": { "pattern": "^backend-v" },
                "transformer": { "pattern": "^backend-v(.+)$", "target": "$1" }
              },
              "label_extractor": [
                {
                  "pattern": "^(feat|fix|perf|refactor|revert|build|chore|ci|docs|style|test)[^:]*:.*",
                  "on_property": "title",
                  "target": "$1"
                }
              ],
              "categories": [
                { "title": "## 🚀 新功能", "labels": ["feat"] },
                { "title": "## 🐛 修复", "labels": ["fix"] },
                { "title": "## ⚡ 性能", "labels": ["perf"] },
                { "title": "## ♻️ 重构", "labels": ["refactor"] },
                { "title": "## ⏪ 回滚", "labels": ["revert"] }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          : > notes.md
          # 1) annotated tag 注释置顶（轻量 tag 无注释，%(contents) 会错取 commit，故先判类型）
          if [ "$(git cat-file -t "$TAG")" = "tag" ]; then
            git tag -l --format='%(contents)' "$TAG" >> notes.md
            printf '\n\n' >> notes.md
          fi
          # 2) 按类型过滤的变更日志置于其下（经 env 传入，不用 GitHub 表达式直插脚本）
          printf '%s\n' "$CHANGELOG" >> notes.md
          # 3) 空正文兜底：注释为空 + 变更日志被全过滤时整篇空白，补占位文案
          if [ -z "$(tr -d '[:space:]' < notes.md)" ]; then
            echo "- 本次无面向用户的变更" > notes.md
          fi
          # Release 标题用的版本号 = tag 去前缀
          echo "version=${TAG#backend-v}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: MintPop API Backend v${{ steps.notes.outputs.version }}
          body_path: notes.md
