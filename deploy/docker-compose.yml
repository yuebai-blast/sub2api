# Sub2API Docker 部署：backend + user-portal 两镜像
#
# 网络说明：外部反代（如 Caddy，见 Caddyfile）必须加入本 compose 网络才能
#          通过服务名（backend:8080、user-portal:80）与容器通信。
#
# 数据库/缓存：PostgreSQL 与 Redis 为外部独立服务（不在本 compose 中），
#              通过 .env 文件配置其主机地址。

services:
  backend:
    image: ghcr.io/${OWNER}/sub2api:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # 单一 bind mount：config.yaml、logs、pricing、.installed 等全部落在 ./data 下
      # （容器内 /app/data 是配置查找与数据落地的默认目录），把 config.yaml 放在 ./data/config.yaml
      - ./data:/app/data
    ports:
      - "127.0.0.1:9200:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-m", "5", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  user-portal:
    image: ghcr.io/${OWNER}/sub2api-user-portal:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9201:80"
