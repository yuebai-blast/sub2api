# Sub2API Docker 部署：backend + user-portal 两镜像
#
# 网络说明：外部反代（如 Caddy，见 Caddyfile）必须加入本 compose 网络才能
#          通过服务名（backend:8080、user-portal:80）与容器通信。
#
# 数据库/缓存：PostgreSQL 与 Redis 为外部独立服务（不在本 compose 中），
#              通过 .env 文件配置其主机地址。

services:
  backend:
    image: ghcr.io/OWNER/sub2api:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - backend_data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-m", "5", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  user-portal:
    image: ghcr.io/OWNER/sub2api-user-portal:latest
    restart: unless-stopped
    ports:
      - "8081:80"

volumes:
  backend_data:
